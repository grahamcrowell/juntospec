# platform-contract.yaml — juntospec ↔ juntogen machine-readable contract.
#
# Identifiers and structural invariants only. No prose, no semantics not
# expressible as identifiers. Consumers (juntogen, validators) MUST NOT rely
# on free-form text beyond the frozen primitive `role` one-liners below.
#
# anchor_status semantics:
#   pending — anchor declared, juntogen not yet emitting canonical profile.
#   active  — juntogen emits canonical profile text carrying the anchor.
# All 8 primitives remain `pending` until juntogen emits canonical profile
# text carrying each anchor (deferred to the plugin-shape work that lands
# canonical profiles under oj-{platform}/agents/).
---
version: "0.1.0"
contract_name: "juntospec-platform-contract"
generated_for: "claude"

