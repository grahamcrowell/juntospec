# --- primitives ----------------------------------------------------------
# Exactly 8 coordination primitives. `role` strings are frozen — any change
# requires a coordinated juntospec + juntogen + oj-claude release.
# `anchor_status: pending` for all until juntogen emits canonical profiles.
primitives:
  - name: "Consult"
    role: "delegation primitive — manager invokes a single expert sub-agent for a scoped task, receives a handback"
    anchor: "canonical-consult"
    anchor_status: "pending"
  - name: "Convene"
    role: "team-formation primitive — manager assembles a multi-expert team for parallel deliberation with a deputy coordinator"
    anchor: "canonical-convene"
    anchor_status: "pending"
    # Axiom 8 graceful degradation: when the platform-bound Convene capability
    # is unavailable (e.g., the platform's team-formation feature is gated off
    # in an adopter environment), Complex-tier execution degrades to a
    # Consult-fan-out coordinator pattern (deputy coordinator spawned via the
    # Consult primitive, fanning out parallel stakeholder Consults with
    # handback-only synthesis). Peer-messaging (Inform) is NOT used in the
    # degraded path because Inform is gated by the same platform capability.
    # User Checkpoint and synthesis semantics are preserved.
    degrades_to: "Consult"
  - name: "Inform"
    role: "peer-messaging primitive — intra-team relay of findings and questions between agents during an active engagement"
    anchor: "canonical-inform"
    anchor_status: "pending"
  - name: "Onboard"
    role: "spawn-time profile-injection primitive — platform hook fires when a sub-agent is created and injects its role profile as context"
    anchor: "canonical-onboard"
    anchor_status: "pending"
  - name: "CONDUCTOR.md"
    role: "manager protocol file — loaded by the platform at session start; defines the manager-coordinator contract and triage protocol"
    anchor: "canonical-conductor"
    anchor_status: "pending"
    abstract_name: "manager-protocol-file"  # spec-prose alias for the abstract concept; concrete filename binding remains CONDUCTOR.md per platform contract
  - name: "install-root"
    role: "filesystem-install-root primitive — the directory under which OpenJunto installs its protocol, agents, reference, templates, and commands; concrete path binding (e.g., `~/.claude/` on Claude Code) lives in platform-defaults.yaml"
    anchor: "canonical-install-root"
    anchor_status: "pending"
  - name: "model-tier"
    role: "cognitive-demand abstraction primitive — derivation chains and protocol prose refer to model capability classes (routine, implementation, reasoning) with cost ratios; concrete model-id binding (e.g., sonnet/opus[1m]/fable) lives in platform-defaults.yaml"
    anchor: "canonical-model-tier"
    anchor_status: "pending"
  - name: "operational-namespace"
    role: "OpenJunto-owned filesystem namespace primitive — `state/`, `evolution/`, and `archive/` subdirectories under {install-root} that hold session/measurement/artifact data; namespace is OpenJunto's, not the platform's, even though the directory tree happens to live under the platform's install root"
    anchor: "canonical-operational-namespace"
    anchor_status: "pending"

# --- layout --------------------------------------------------------------
# Structural invariants of the juntospec repo. Consumers (juntogen, validators)
# rely on these to locate and order specs.
layout:
  spec_file_pattern: "^[DFM]\\d{2}-[a-z0-9-]+\\.md$"
  spec_root: "."
  foundational_file: "F08-axioms.md"
  architecture_file: "F16-architecture.md"
  numbering_gap: 8
  reading_order:
    - {layer: "foundations", prefix: "F"}
    - {layer: "domain",      prefix: "D"}
    - {layer: "meta",        prefix: "M"}
  # All 14 D/F/M files carry `id`, `title`, `layer` in frontmatter (verified
  # 2026-04-20). If a future spec drops a key, relax this set in the same
  # commit that lands the new file.
  frontmatter_required_keys: ["id", "title", "layer"]

  # spec_files — BL-025-h.1: whole-file references for step prompts.
  # Each entry registers a file by basename for resolution via the
  # `[FILE: <basename>]` marker. Resolution rules:
  #
  #   file_repo: ""           => resolve under SPEC_DIR (juntospec default)
  #   file_repo: "juntospec"  => resolve under SPEC_DIR (explicit)
  #   file_repo: "juntogen"   => resolve under JUNTOGEN_ROOT
  #
  # Optional `path:` overrides `file:` for path resolution while `file:`
  # remains the basename used in the marker syntax. Use `path:` for
  # cross-repo prefixes (e.g. juntogen entries must include the `claude/`
  # subdirectory).
  #
  # Two-marker model (TENSION-1):
  #   [CANONICAL: id]          — section anchor; resolves to host file
  #   [FILE: basename]         — whole-file reference
  #
  # Adding a new spec_files entry MUST be paired with the file actually
  # existing at the resolved path; contract-validate.sh's
  # spec-file-marker-closure check fails closed on dangling entries.
  #
  # Entry shape:
  #   - file: "F16-architecture.md"        # basename used in [FILE: ...]
  #     file_repo: ""                       # "" | "juntospec" | "juntogen"
  #     path: ""                            # optional override; defaults to file
  spec_files:
    - file: "F08-axioms.md"
      file_repo: "juntospec"
    - file: "F16-architecture.md"
      file_repo: "juntospec"
    - file: "D08-core-protocol.md"
      file_repo: "juntospec"
    - file: "D72-enterprise-overlay.md"
      file_repo: "juntospec"
    - file: "D64-tooling.md"
      file_repo: "juntogen"
      path: "claude/D64-tooling.md"

# --- output_classes ------------------------------------------------------
# BL-025-m.1 (F3): two-class taxonomy for files emitted into the generated
# plugin tree. Class membership is mutually exclusive — every committed
# output file belongs to exactly one class.
#
#   data  — deterministic / static / template-driven. Byte-diff applies.
#           Re-running the generator with no input change must produce
#           byte-identical output. Examples: plugin.json, hooks.json,
#           platform-snapshot.yaml, bin/lib/contracts.sh.
#   prose — LLM-generated narrative or LLM-generated helper script.
#           Byte-diff does NOT apply (temperature drift, paraphrase).
#           Examples: every *.md, bin/oj-helper. Validation is via shape
#           and contract checks (frontmatter parse, contract-string-
#           reference, etc.), never literal-byte equality.
#
# Consumer: juntogen/claude/validation/scripts/structural-diff.sh uses
# this taxonomy to decide byte-diff vs. shape-only-diff per file when
# comparing a fresh regen tree against the frozen plugin-tree snapshot.
output_classes:
  data:
    - "*.json"
    - "*.yaml"
    - "bin/lib/*.sh"
  prose:
    - "*.md"
    - "bin/oj-helper"

# --- banned_terms --------------------------------------------------------
# BL-025-e: machine-readable source of truth for the BL-025-c/d vocabulary
# audit. Lists Claude-platform identifiers and concrete bindings that MUST
# NOT appear in core spec corpus prose. Audit script reads this block via
# the python3 yaml helper and fails closed on any occurrence outside the
# `keep_list:` exemption block AND outside the regions enumerated in
# `exempt_regions:`.
#
# Entry shape:
#   - term: "Task tool"             # required, the literal/regex to match
#     kind: "literal" | "regex"     # required; literal = byte-exact substring
#     scope: "core-spec-corpus"     # required; pinned for now (D/F/M*.md +
#                                   #   README.md + MANIFEST.md at juntospec root)
#     assertion: "s13"              # required; tier-a-assertions.sh section that
#                                   #   enforces this term. Permitted: s13 (BL-026
#                                   #   platform-tool literals), s14 (filesystem
#                                   #   path literal), s15 (CLAUDE.md literal),
#                                   #   s16 (concrete model-id regex). Adding a
#                                   #   new entry with `assertion: s13` (etc.) is
#                                   #   the supported way to extend tier-a hygiene
#                                   #   without code changes (BL-025-e.1).
#     exempt_regions:               # optional; named regions where the term
#                                   #   may appear without a keep_list entry
#       - "m16-section-3"           # M16 §3 platform-capabilities anchor
#       - "d08-verbatim-blocks"     # D08 (verbatim): fenced reproductions
#     note: "Free-form rationale (optional)"
#
# Region semantics are implemented in
# juntogen/claude/validation/scripts/lib/exempt-regions.awk — entry shape
# here is data; the awk helper is the executable contract. Mirror of the
# tier-a-assertions.sh §13/§15 region machinery (do not modify there;
# this is a parallel readonly mirror per BL-025-e/f boundary).
banned_terms:
  # BL-025-c sweep targets — Claude Code platform tool/hook identifiers.
  - term: "Task tool"
    kind: "literal"
    scope: "core-spec-corpus"
    assertion: "s13"
    exempt_regions: ["m16-section-3", "d08-verbatim-blocks"]
    note: "Claude Code Agent tool — spec corpus uses Consult primitive"
  - term: "TeamCreate"
    kind: "literal"
    scope: "core-spec-corpus"
    assertion: "s13"
    exempt_regions: ["m16-section-3", "d08-verbatim-blocks"]
    note: "Claude Code TeamCreate tool — spec corpus uses Convene primitive"
  - term: "SendMessage"
    kind: "literal"
    scope: "core-spec-corpus"
    assertion: "s13"
    exempt_regions: ["m16-section-3", "d08-verbatim-blocks"]
    note: "Claude Code SendMessage tool — spec corpus uses Inform primitive"
  - term: "SubagentStart"
    kind: "literal"
    scope: "core-spec-corpus"
    assertion: "s13"
    exempt_regions: ["m16-section-3", "d08-verbatim-blocks"]
    note: "Claude Code SubagentStart hook event — spec corpus uses Onboard primitive"
  # BL-025-d sweep targets — concrete bindings that must use abstract primitives.
  - term: "~/.claude/"
    kind: "literal"
    scope: "core-spec-corpus"
    assertion: "s14"
    exempt_regions: ["m16-section-3", "d08-verbatim-blocks"]
    note: "Claude filesystem path — spec corpus uses {install-root}/ primitive"
  - term: "CLAUDE.md"
    kind: "literal"
    scope: "core-spec-corpus"
    assertion: "s15"
    exempt_regions: ["m16-section-3", "d08-verbatim-blocks"]
    note: "Claude manager-protocol filename — spec corpus uses CONDUCTOR.md / 'manager protocol file'"
  # BL-025-d concrete model-id sweep targets. Word-boundary semantics enforced
  # by the regex form (BSD-awk-portable: non-word char neighbors or line edges).
  - term: "(^|[^a-zA-Z0-9_-])(haiku|sonnet|opus)([^a-zA-Z0-9_-]|$)"
    kind: "regex"
    scope: "core-spec-corpus"
    assertion: "s16"
    exempt_regions: ["m16-section-3", "d08-verbatim-blocks"]
    note: "Concrete Claude model IDs — spec corpus uses {tier-routine}/{tier-implementation}/{tier-reasoning}"

